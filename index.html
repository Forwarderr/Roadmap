<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1e293b">
    <meta name="description" content="Interactive learning roadmap tracker">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Roadmap">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <title>Roadmap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-border: rgba(255, 255, 255, 0.4);
            --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f0f4f8;
            color: #1e293b;
            overflow-x: hidden;
            scroll-behavior: smooth;
            scrollbar-gutter: stable;
        }

        /* --- GPU ACCELERATED AMBIENCE --- */
        .ambient-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            opacity: 0.6;
            will-change: transform;
            animation: float-orb 20s infinite ease-in-out;
            transform: translateZ(0);
        }
        .orb-1 { top: -10%; left: -10%; width: 50vw; height: 50vw; background: #bfdbfe; animation-delay: 0s; }
        .orb-2 { bottom: -10%; right: -10%; width: 60vw; height: 60vw; background: #ddd6fe; animation-delay: -5s; }
        .orb-3 { top: 40%; left: 40%; width: 40vw; height: 40vw; background: #e2e8f0; animation-delay: -10s; }

        @keyframes float-orb {
            0%, 100% { transform: translate(0, 0); }
            33% { transform: translate(30px, -50px); }
            66% { transform: translate(-20px, 20px); }
        }

        /* --- ROAD LAYER --- */
        .roadmap-container {
            position: relative;
            max-width: 900px;
            margin: 0 auto;
            z-index: 1;
            min-height: 50vh;
            isolation: isolate;
        }

        .road-svg-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            overflow: visible;
            filter: drop-shadow(0px 4px 10px rgba(0,0,0,0.1));
            pointer-events: none;
        }

        @keyframes flowDash {
            to { stroke-dashoffset: -1000; }
        }
        .road-flow {
            stroke-dasharray: 10 20;
            animation: flowDash 60s linear infinite;
            will-change: stroke-dashoffset;
        }

        /* --- CARDS --- */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            border-radius: 24px;
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
            transform: translateZ(0);
            will-change: transform;
        }

        .glass-card:hover {
            transform: translateY(-5px) translateZ(0);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            border-color: rgba(255,255,255,0.9);
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 24px;
            padding: 2px;
            background: radial-gradient(600px circle at var(--mouse-x) var(--mouse-y), rgba(255,255,255,0.7), transparent 40%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s ease;
            will-change: opacity;
        }
        .glass-card:hover::before { opacity: 1; }

        /* Custom Checkbox */
        .custom-checkbox {
            appearance: none;
            background-color: #fff;
            margin: 0;
            font: inherit;
            color: currentColor;
            width: 1.25em;
            height: 1.25em;
            border: 2px solid #cbd5e1;
            border-radius: 0.25em;
            display: grid;
            place-content: center;
            transition: all 0.2s ease-in-out;
            cursor: pointer;
            flex-shrink: 0;
        }
        .custom-checkbox::before {
            content: "";
            width: 0.65em;
            height: 0.65em;
            transform: scale(0);
            transition: 120ms transform ease-in-out;
            box-shadow: inset 1em 1em white;
            transform-origin: center;
            clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
        }
        .custom-checkbox:checked { background-color: #3b82f6; border-color: #3b82f6; }
        .custom-checkbox:checked::before { transform: scale(1); }

        /* Dropdown */
        select.glass-select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%233b82f6%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 0.7rem top 50%;
            background-size: 0.65rem auto;
            padding-right: 2.5rem;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; border: 2px solid #f0f4f8; }

        @keyframes float-idle {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .float-anim {
            animation: float-idle 5s ease-in-out infinite;
            will-change: transform;
        }

        .reward-glow { box-shadow: 0 0 60px 20px rgba(250, 204, 21, 0.15); }
        .trophy-anim { animation: trophy-bounce 2s infinite ease-in-out; }
        @keyframes trophy-bounce {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(2deg); }
        }

        body.modal-open {
            overflow: hidden;
            padding-right: var(--scrollbar-width, 0px);
        }

        /* Toast notification */
        #toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #1e293b;
            color: white;
            padding: 10px 20px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 600;
            z-index: 9999;
            transition: transform 0.3s cubic-bezier(0.2,0.8,0.2,1), opacity 0.3s ease;
            opacity: 0;
            white-space: nowrap;
        }
        #toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* Confirm dialog overlay */
        #confirm-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(6px);
            z-index: 9998;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        #confirm-backdrop.active {
            display: flex;
        }

        /* Offline banner */
        #offline-banner {
            position: fixed;
            top: 0; left: 0; right: 0;
            background: #f59e0b;
            color: #78350f;
            text-align: center;
            font-size: 12px;
            font-weight: 700;
            padding: 6px;
            z-index: 200;
            transform: translateY(-100%);
            transition: transform 0.3s ease;
        }
        #offline-banner.show { transform: translateY(0); }

        /* PWA install banner */
        #install-banner {
            position: fixed;
            bottom: 16px;
            right: 16px;
            z-index: 100;
        }
    </style>
</head>
<body class="min-h-screen selection:bg-blue-200 selection:text-blue-900">

    <!-- Offline Banner -->
    <div id="offline-banner">⚡ You're offline — showing cached data</div>

    <div class="ambient-orb orb-1"></div>
    <div class="ambient-orb orb-2"></div>
    <div class="ambient-orb orb-3"></div>

    <!-- HEADER -->
    <header class="fixed top-0 left-0 w-full z-50 px-4 md:px-6 py-4 transition-all duration-300">
        <div class="max-w-4xl mx-auto glass-card !rounded-full px-4 py-2 md:py-3 flex justify-between items-center !bg-white/80 backdrop-blur-xl border border-white/60 shadow-sm gap-3">

            <!-- Map Selector -->
            <div class="flex-shrink-0">
                <select id="map-selector" class="glass-select bg-slate-50/50 hover:bg-white border border-slate-200 text-slate-700 text-sm font-bold rounded-full py-2 pl-3 pr-9 cursor-pointer focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all shadow-sm max-w-[140px] md:max-w-none">
                    <option value="" disabled selected>Loading...</option>
                </select>
            </div>

            <!-- Action Buttons + Progress -->
            <div class="flex items-center gap-2 flex-shrink-0">
                <!-- Undo Button -->
                <button id="undo-btn" title="Undo last action" onclick="undoLastAction()"
                    class="w-8 h-8 rounded-full bg-slate-100 hover:bg-amber-100 hover:text-amber-600 flex items-center justify-center text-slate-400 transition-all disabled:opacity-30"
                    disabled>
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"/>
                    </svg>
                </button>

                <!-- Reset Button -->
                <button title="Reset all progress for this roadmap" onclick="confirmReset()"
                    class="w-8 h-8 rounded-full bg-slate-100 hover:bg-red-100 hover:text-red-500 flex items-center justify-center text-slate-400 transition-all">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                    </svg>
                </button>

                <!-- Progress Bar -->
                <div class="w-14 md:w-24 h-2 bg-slate-200/50 rounded-full overflow-hidden backdrop-blur-sm">
                    <div id="progress-bar" class="h-full bg-gradient-to-r from-blue-500 to-cyan-400 transition-all duration-700 ease-out shadow-[0_0_10px_rgba(59,130,246,0.5)]" style="width: 0%"></div>
                </div>
                <span id="progress-text" class="text-blue-600 font-bold text-sm min-w-[32px]">0%</span>
            </div>
        </div>
    </header>

    <main class="pt-32 px-4 pb-32">
        <div class="text-center mb-12 relative z-10">
            <h1 id="page-title" class="text-3xl md:text-5xl font-extrabold text-slate-800 tracking-tight mb-2">...</h1>
            <p id="page-subtitle" class="text-slate-500 font-medium tracking-wide uppercase text-sm">...</p>
        </div>

        <div class="roadmap-container" id="roadmap-container">
            <div id="loading-indicator" class="absolute inset-0 flex flex-col items-center justify-center z-50">
                <div class="w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                <p class="text-slate-500 font-bold text-sm tracking-wide">LOADING...</p>
            </div>

            <svg id="road-svg" class="road-svg-layer" preserveAspectRatio="none">
                <defs>
                    <linearGradient id="roadGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" style="stop-color:#334155;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
                    </linearGradient>
                </defs>
                <path id="road-base" fill="none" stroke="url(#roadGradient)" stroke-width="70" stroke-linecap="round" stroke-linejoin="round" />
                <path id="road-stripes" class="road-flow" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-dasharray="10, 40" stroke-linecap="round" />
                <path id="road-progress" fill="none" stroke="#60a5fa" stroke-width="6" stroke-dasharray="0, 10000" stroke-linecap="round" style="filter: drop-shadow(0 0 10px rgba(96,165,250,0.8)); transition: stroke-dasharray 1.2s cubic-bezier(0.4, 0, 0.2, 1);" />
            </svg>

            <div id="nodes-layer" class="relative z-10"></div>
        </div>
    </main>

    <!-- DETAIL MODAL -->
    <div id="modal-backdrop" class="fixed inset-0 bg-slate-900/40 backdrop-blur-md z-50 hidden flex items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <div id="modal-panel" class="glass-card w-full max-w-2xl max-h-[85vh] !bg-white/95 shadow-2xl flex flex-col transform scale-95 transition-transform duration-300">
            <div class="p-6 md:p-8 border-b border-slate-100 flex justify-between items-start gap-4">
                <div>
                    <div id="modal-subtitle" class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Step Details</div>
                    <h2 id="modal-title" class="text-2xl md:text-3xl font-extrabold text-slate-800 tracking-tight">Title</h2>
                </div>
                <button onclick="closeModal()" class="w-10 h-10 flex-shrink-0 rounded-full bg-slate-100 hover:bg-slate-200 flex items-center justify-center text-slate-500 transition-colors">✕</button>
            </div>

            <div id="modal-content" class="p-6 md:p-8 overflow-y-auto space-y-4"></div>

            <div class="p-4 md:p-6 border-t border-slate-100 bg-slate-50/50 rounded-b-2xl flex flex-col sm:flex-row gap-3 sm:items-center sm:justify-between">
                <div class="flex items-center gap-3">
                    <span id="modal-progress-text" class="text-sm font-medium text-slate-500">0/0 Completed</span>
                    <div class="w-24 h-2 bg-slate-200 rounded-full overflow-hidden">
                        <div id="modal-progress-bar" class="h-full bg-blue-500 transition-all duration-300" style="width: 0%"></div>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button onclick="undoLastAction()" id="modal-undo-btn"
                        class="px-3 py-1.5 rounded-lg text-xs font-bold bg-amber-50 text-amber-600 hover:bg-amber-100 transition-colors disabled:opacity-40 flex items-center gap-1"
                        disabled>
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"/></svg>
                        Undo
                    </button>
                    <button onclick="confirmReset()"
                        class="px-3 py-1.5 rounded-lg text-xs font-bold bg-red-50 text-red-500 hover:bg-red-100 transition-colors flex items-center gap-1">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                        Reset
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- REWARD MODAL -->
    <div id="reward-backdrop" class="fixed inset-0 bg-slate-900/60 backdrop-blur-lg z-[60] hidden flex items-center justify-center p-4 opacity-0 transition-opacity duration-500">
        <div id="reward-panel" class="glass-card w-full max-w-md transform scale-90 transition-all duration-500 !bg-white/95 border-2 border-yellow-200 reward-glow text-center p-10">
            <div class="w-24 h-24 mx-auto mb-6 trophy-anim drop-shadow-2xl">
                <svg viewBox="0 0 24 24" fill="none" class="w-full h-full text-yellow-400" stroke="currentColor" stroke-width="1.5">
                    <path fill="url(#trophyGradient)" d="M12 15C15.866 15 19 11.866 19 8V3H5V8C5 11.866 8.13401 15 12 15Z" stroke="none"/>
                    <path d="M19 8C20.6569 8 22 6.65685 22 5C22 3.34315 20.6569 2 19 2M5 8C3.34315 8 2 6.65685 2 5C2 3.34315 3.34315 2 5 2" stroke="#eab308" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M12 15V19" stroke="#eab308" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M8 22H16" stroke="#eab308" stroke-linecap="round" stroke-linejoin="round"/>
                    <defs>
                        <linearGradient id="trophyGradient" x1="12" y1="3" x2="12" y2="22" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#facc15" /><stop offset="1" stop-color="#eab308" />
                        </linearGradient>
                    </defs>
                </svg>
            </div>
            <h2 id="reward-title" class="text-3xl font-black text-slate-800 tracking-tight mb-2">GOAL REACHED</h2>
            <div class="w-16 h-1 bg-yellow-400 mx-auto rounded-full mb-6"></div>
            <p id="reward-message" class="text-slate-500 font-medium text-sm mb-8 leading-relaxed">Completed.</p>
            <button onclick="closeReward()" class="w-full py-3.5 rounded-xl font-bold text-sm bg-yellow-400 text-yellow-900 hover:bg-yellow-300 transition-colors shadow-lg hover:shadow-yellow-200">
                COLLECT REWARD
            </button>
        </div>
    </div>

    <!-- CONFIRM RESET DIALOG -->
    <div id="confirm-backdrop">
        <div class="glass-card !bg-white/95 w-full max-w-sm p-8 text-center shadow-2xl">
            <div class="w-14 h-14 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-7 h-7 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                </svg>
            </div>
            <h3 class="text-xl font-extrabold text-slate-800 mb-2">Reset Progress?</h3>
            <p class="text-slate-500 text-sm mb-6 leading-relaxed">All ticked items for <strong id="confirm-map-name" class="text-slate-700"></strong> will be cleared. This cannot be undone.</p>
            <div class="flex gap-3">
                <button onclick="closeConfirm()" class="flex-1 py-2.5 rounded-xl font-bold text-sm bg-slate-100 text-slate-600 hover:bg-slate-200 transition-colors">Cancel</button>
                <button onclick="executeReset()" class="flex-1 py-2.5 rounded-xl font-bold text-sm bg-red-500 text-white hover:bg-red-600 transition-colors">Reset</button>
            </div>
        </div>
    </div>

    <!-- TOAST -->
    <div id="toast"></div>

    <!-- PWA Install Banner -->
    <div id="install-banner" class="hidden">
        <button id="install-btn" class="glass-card !bg-white/90 px-4 py-2.5 text-xs font-bold text-slate-700 flex items-center gap-2 shadow-lg hover:shadow-xl transition-all">
            <svg class="w-4 h-4 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
            </svg>
            Install App
        </button>
    </div>

    <script>
        // =============================================
        // CONFIG
        // =============================================
        const GITHUB_API = 'https://api.github.com/repos/Forwarderr/rdmap/contents/';
        const RAW_BASE   = 'https://raw.githubusercontent.com/Forwarderr/rdmap/main/';
        const CACHE_KEY_MAP_LIST = 'rdmap_file_list';
        const CACHE_TTL = 5 * 60 * 1000; // 5 minutes — refresh file list from GitHub

        // =============================================
        // STATE
        // =============================================
        let META_DATA = {};
        let STAGES_DATA = [];
        let completedItems = new Set();   // Using Set for O(1) lookups
        let undoStack = [];               // Stack of {action, itemId, snapshot}
        let STORAGE_KEY = '';
        let TOTAL_ITEMS_COUNT = 0;
        let currentModalStageId = null;
        let currentMapName = '';

        // =============================================
        // PWA: SERVICE WORKER REGISTRATION
        // =============================================
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => console.warn('SW reg failed:', err));
            });
        }

        // =============================================
        // PWA: INSTALL PROMPT
        // =============================================
        let deferredInstallPrompt = null;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredInstallPrompt = e;
            document.getElementById('install-banner').classList.remove('hidden');
        });
        document.getElementById('install-btn').addEventListener('click', () => {
            if (!deferredInstallPrompt) return;
            deferredInstallPrompt.prompt();
            deferredInstallPrompt.userChoice.then(() => {
                deferredInstallPrompt = null;
                document.getElementById('install-banner').classList.add('hidden');
            });
        });
        window.addEventListener('appinstalled', () => {
            document.getElementById('install-banner').classList.add('hidden');
            showToast('✅ App installed!');
        });

        // =============================================
        // OFFLINE DETECTION
        // =============================================
        function updateOnlineStatus() {
            const banner = document.getElementById('offline-banner');
            if (!navigator.onLine) banner.classList.add('show');
            else banner.classList.remove('show');
        }
        window.addEventListener('online', updateOnlineStatus);
        window.addEventListener('offline', updateOnlineStatus);

        // =============================================
        // SCROLLBAR WIDTH FIX
        // =============================================
        const scrollbarWidth = window.innerWidth - document.documentElement.clientWidth;
        document.documentElement.style.setProperty('--scrollbar-width', `${scrollbarWidth}px`);

        // =============================================
        // TOAST
        // =============================================
        let toastTimer;
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
        }

        // =============================================
        // GITHUB: AUTO-FETCH JSON FILE LIST
        // =============================================
        async function loadMapList() {
            const selector = document.getElementById('map-selector');

            // Try cache first (with TTL)
            try {
                const cached = localStorage.getItem(CACHE_KEY_MAP_LIST);
                if (cached) {
                    const { ts, files } = JSON.parse(cached);
                    if (Date.now() - ts < CACHE_TTL) {
                        populateSelector(selector, files);
                        return;
                    }
                }
            } catch(_) {}

            // Fetch from GitHub API
            try {
                const resp = await fetch(GITHUB_API);
                if (!resp.ok) throw new Error('GitHub API error');
                const items = await resp.json();

                // Filter to only .json files
                const files = items
                    .filter(f => f.type === 'file' && f.name.endsWith('.json'))
                    .map(f => ({ name: f.name.replace('.json', ''), file: f.name }));

                if (!files.length) throw new Error('No JSON files found');

                // Cache the list
                localStorage.setItem(CACHE_KEY_MAP_LIST, JSON.stringify({ ts: Date.now(), files }));

                populateSelector(selector, files);

            } catch (err) {
                console.error('loadMapList error:', err);
                // Try using stale cache if offline
                try {
                    const cached = localStorage.getItem(CACHE_KEY_MAP_LIST);
                    if (cached) {
                        const { files } = JSON.parse(cached);
                        showToast('⚡ Using cached map list');
                        populateSelector(selector, files);
                        return;
                    }
                } catch(_) {}

                selector.innerHTML = '<option>Error loading maps</option>';
                document.getElementById('loading-indicator').innerHTML =
                    `<p class="text-red-500 font-bold text-center px-4">Could not load map list.<br><span class="text-slate-400 font-normal text-xs">Check your connection.</span></p>`;
            }
        }

        function populateSelector(selector, files) {
            selector.innerHTML = '';
            files.forEach(map => {
                const opt = document.createElement('option');
                opt.value = map.file;
                opt.textContent = map.name;
                selector.appendChild(opt);
            });

            // Restore last-used map
            const lastUsed = localStorage.getItem('rdmap_last_map');
            const target = files.find(f => f.file === lastUsed) ? lastUsed : files[0]?.file;
            if (target) {
                selector.value = target;
                loadRoadmap(target);
            }

            selector.addEventListener('change', (e) => {
                localStorage.setItem('rdmap_last_map', e.target.value);
                loadRoadmap(e.target.value);
            });
        }

        // =============================================
        // LOAD ROADMAP JSON FROM GITHUB RAW
        // =============================================
        async function loadRoadmap(filename) {
            document.getElementById('loading-indicator').style.display = 'flex';
            document.getElementById('loading-indicator').innerHTML = `
                <div class="w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                <p class="text-slate-500 font-bold text-sm tracking-wide">LOADING...</p>`;
            document.getElementById('nodes-layer').innerHTML = '';

            const cacheKey = `rdmap_json_${filename}`;

            try {
                let fullData;

                try {
                    // Fetch fresh from GitHub raw
                    const resp = await fetch(RAW_BASE + filename);
                    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                    fullData = await resp.json();
                    // Cache it for offline use
                    localStorage.setItem(cacheKey, JSON.stringify(fullData));
                } catch (fetchErr) {
                    // Fallback to cached version
                    const cached = localStorage.getItem(cacheKey);
                    if (cached) {
                        fullData = JSON.parse(cached);
                        showToast('⚡ Loaded from cache');
                    } else {
                        throw fetchErr;
                    }
                }

                if (Array.isArray(fullData)) {
                    STAGES_DATA = fullData;
                    META_DATA = { title: filename.replace('.json',''), subtitle: 'Interactive Guide' };
                } else {
                    STAGES_DATA = fullData.stages || [];
                    META_DATA = fullData.meta || {};
                }

                currentMapName = META_DATA.title || filename.replace('.json','');

                // Storage key per-map
                const roadmapId = (META_DATA.id || currentMapName).replace(/\s+/g,'_').toLowerCase();
                STORAGE_KEY = `rdmap_progress_${roadmapId}`;

                // Load saved progress
                try {
                    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
                    completedItems = new Set(Array.isArray(saved) ? saved : []);
                } catch(_) {
                    completedItems = new Set();
                }

                // Clear undo stack on map change
                undoStack = [];
                updateUndoButtons();

                // Count total items
                TOTAL_ITEMS_COUNT = 0;
                STAGES_DATA.forEach(stage => {
                    if (stage.details && Array.isArray(stage.details)) {
                        stage.details.forEach(sec => {
                            if (sec.items) TOTAL_ITEMS_COUNT += sec.items.length;
                        });
                    }
                });

                document.title = currentMapName;
                document.getElementById('page-title').textContent = currentMapName.toUpperCase();
                document.getElementById('page-subtitle').textContent = META_DATA.subtitle || '';
                document.getElementById('loading-indicator').style.display = 'none';

                updateUI();
                renderRoadmap();
                initSpotlight();

            } catch(e) {
                console.error('loadRoadmap error:', e);
                document.getElementById('loading-indicator').innerHTML =
                    `<p class="text-red-500 font-bold text-center px-4">Failed to load: ${e.message}</p>`;
            }
        }

        // =============================================
        // PERSIST PROGRESS
        // =============================================
        function saveProgress() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify([...completedItems]));
        }

        // =============================================
        // UNDO
        // =============================================
        function updateUndoButtons() {
            const canUndo = undoStack.length > 0;
            document.getElementById('undo-btn').disabled = !canUndo;
            document.getElementById('modal-undo-btn').disabled = !canUndo;
        }

        function undoLastAction() {
            if (!undoStack.length) return;
            const { action, itemId } = undoStack.pop();

            if (action === 'check') {
                completedItems.delete(itemId);
            } else {
                completedItems.add(itemId);
            }

            saveProgress();
            updateUndoButtons();
            updateUI();
            renderRoadmap();

            if (currentModalStageId) {
                const data = STAGES_DATA.find(d => d.id === currentModalStageId);
                if (data) {
                    updateModalProgress(data);
                    refreshModalCheckboxes();
                }
            }
            showToast('↩ Undone');
        }

        // =============================================
        // RESET
        // =============================================
        function confirmReset() {
            document.getElementById('confirm-map-name').textContent = `"${currentMapName}"`;
            document.getElementById('confirm-backdrop').classList.add('active');
        }
        function closeConfirm() {
            document.getElementById('confirm-backdrop').classList.remove('active');
        }
        function executeReset() {
            closeConfirm();
            undoStack = [];
            completedItems = new Set();
            saveProgress();
            updateUndoButtons();
            updateUI();
            renderRoadmap();
            if (currentModalStageId) {
                const data = STAGES_DATA.find(d => d.id === currentModalStageId);
                if (data) {
                    updateModalProgress(data);
                    refreshModalCheckboxes();
                }
            }
            showToast('🔄 Progress reset');
        }

        // =============================================
        // STAGE STATS
        // =============================================
        function getStageStats(stage) {
            let total = 0, checked = 0;
            if (!stage.details || !Array.isArray(stage.details)) return { total: 0, checked: 0 };
            stage.details.forEach((sec, sIdx) => {
                if (sec.items) {
                    sec.items.forEach((_, iIdx) => {
                        total++;
                        if (completedItems.has(`${stage.id}-s${sIdx}-i${iIdx}`)) checked++;
                    });
                }
            });
            return { total, checked };
        }

        // =============================================
        // RENDER ROADMAP
        // =============================================
        function renderRoadmap() {
            if (!STAGES_DATA.length) return;

            const container  = document.getElementById('roadmap-container');
            const nodesLayer = document.getElementById('nodes-layer');
            const roadBase   = document.getElementById('road-base');
            const roadStripes= document.getElementById('road-stripes');
            const roadProgress = document.getElementById('road-progress');

            nodesLayer.innerHTML = '';

            const nodeHeight  = 320;
            const startPad    = 120;
            const endPad      = 250;
            const totalHeight = (STAGES_DATA.length * nodeHeight) + startPad + endPad;
            container.style.height = `${totalHeight}px`;

            const width     = Math.min(container.clientWidth, 900);
            const center    = container.clientWidth / 2;
            const amplitude = Math.min(width * 0.38, 220);

            let points = [{ x: center, y: 50, isStart: true }];
            STAGES_DATA.forEach((data, idx) => {
                const y = (idx * nodeHeight) + 280;
                const x = center + (idx % 2 === 0 ? amplitude : -amplitude);
                points.push({ x, y, data, isNode: true });
            });
            const lastY = points[points.length - 1].y;
            points.push({ x: center, y: lastY + 220, isEnd: true });

            let pathD = `M ${points[0].x} ${points[0].y} `;
            for (let i = 1; i < points.length; i++) {
                const curr = points[i], prev = points[i - 1];
                const cpY = (prev.y + curr.y) / 2;
                pathD += `C ${prev.x} ${cpY}, ${curr.x} ${cpY}, ${curr.x} ${curr.y} `;
            }

            roadBase.setAttribute('d', pathD);
            roadStripes.setAttribute('d', pathD);
            roadProgress.setAttribute('d', pathD);

            const totalLength   = roadBase.getTotalLength();
            const progressRatio = TOTAL_ITEMS_COUNT > 0 ? completedItems.size / TOTAL_ITEMS_COUNT : 0;
            roadProgress.style.strokeDasharray = `${totalLength * progressRatio}, ${totalLength}`;

            const fragment = document.createDocumentFragment();

            points.forEach((p, i) => {
                if (!p.isNode) {
                    if (p.isStart) {
                        const el = document.createElement('div');
                        el.className = 'absolute transform -translate-x-1/2 -translate-y-1/2 bg-slate-800 text-white text-[10px] font-bold px-4 py-1.5 rounded-full z-20 shadow-xl border border-slate-600 tracking-wider';
                        el.style.left = `${p.x}px`;
                        el.style.top  = `${p.y}px`;
                        el.textContent = 'START';
                        fragment.appendChild(el);
                    }
                    if (p.isEnd) {
                        const el = document.createElement('div');
                        el.className = 'absolute transform -translate-x-1/2 -translate-y-1/2 bg-slate-800 text-white text-[10px] font-bold px-4 py-1.5 rounded-full z-20 shadow-xl border border-slate-600 tracking-wider flex items-center gap-2';
                        el.style.left = `${p.x}px`;
                        el.style.top  = `${p.y}px`;
                        el.innerHTML  = `<svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 21v-8a2 2 0 012-2h14a2 2 0 012 2v8M3 13l6-6 6 6m-6-6v12"></path></svg> FINISH LINE`;
                        fragment.appendChild(el);
                    }
                    return;
                }

                const nodeIndex = i - 1;
                const isRight = p.x > center;
                const stats = getStageStats(p.data);
                const isDone = stats.total > 0 && stats.checked === stats.total;

                const nodeEl = document.createElement('div');
                nodeEl.className = 'absolute w-full pointer-events-none z-20';
                nodeEl.style.top  = `${p.y}px`;
                nodeEl.style.left = '0px';

                nodeEl.innerHTML = `
                    <div class="absolute flex ${isRight ? 'justify-end pr-14' : 'justify-start pl-14'} w-full transform -translate-y-1/2" style="pointer-events:auto;">
                        <div data-stage-id="${p.data.id}"
                            class="glass-card p-6 w-72 md:w-96 cursor-pointer group hover:z-30 float-anim stage-card"
                            style="animation-delay: ${nodeIndex * 0.8}s">
                            <div class="absolute top-1/2 ${isRight ? '-right-14' : '-left-14'} w-14 h-[2px] bg-slate-300 group-hover:bg-blue-400 transition-colors transform -translate-y-1/2"></div>
                            <div class="flex justify-between items-center mb-3">
                                <span class="text-[10px] font-bold tracking-widest ${isDone ? 'text-green-600 bg-green-100 px-2 py-1 rounded' : 'text-slate-400'} uppercase transition-colors">
                                    ${isDone ? '✓ Complete' : `Progress: ${stats.checked}/${stats.total}`}
                                </span>
                                <div class="w-20 h-1.5 bg-slate-200 rounded-full overflow-hidden">
                                    <div class="h-full ${isDone ? 'bg-green-500' : 'bg-blue-500'} transition-all duration-500" style="width: ${stats.total > 0 ? (stats.checked/stats.total)*100 : 0}%"></div>
                                </div>
                            </div>
                            <h3 class="text-xl font-bold text-slate-800 leading-tight mb-1 group-hover:text-blue-700 transition-colors">${escHtml(p.data.title)}</h3>
                            <p class="text-xs font-medium ${p.data.color || 'text-slate-500'}">${escHtml(p.data.subtitle || '')}</p>
                        </div>
                    </div>
                    <div class="absolute w-12 h-12 rounded-full border-[4px] border-white shadow-lg z-30 transform -translate-x-1/2 -translate-y-1/2 flex items-center justify-center transition-all duration-500 ${isDone ? 'bg-green-500 scale-110 shadow-[0_0_20px_rgba(34,197,94,0.6)]' : 'bg-slate-700'}" style="left:${p.x}px;">
                        ${isDone
                            ? '<svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>'
                            : `<div class="text-sm font-bold text-white">${nodeIndex + 1}</div>`}
                    </div>`;

                fragment.appendChild(nodeEl);
            });

            nodesLayer.appendChild(fragment);

            // Bind click events via delegation-friendly approach
            nodesLayer.querySelectorAll('.stage-card').forEach(card => {
                card.addEventListener('click', () => openModal(card.dataset.stageId));
            });

            initSpotlight();
        }

        // =============================================
        // XSS PROTECTION
        // =============================================
        function escHtml(str) {
            return String(str)
                .replace(/&/g,'&amp;')
                .replace(/</g,'&lt;')
                .replace(/>/g,'&gt;')
                .replace(/"/g,'&quot;')
                .replace(/'/g,'&#39;');
        }

        // =============================================
        // SPOTLIGHT EFFECT
        // =============================================
        function initSpotlight() {
            document.querySelectorAll('.glass-card').forEach(card => {
                let bounds;
                card.addEventListener('mouseenter', () => { bounds = card.getBoundingClientRect(); });
                card.addEventListener('mousemove', (e) => {
                    if (!bounds) bounds = card.getBoundingClientRect();
                    requestAnimationFrame(() => {
                        card.style.setProperty('--mouse-x', `${e.clientX - bounds.left}px`);
                        card.style.setProperty('--mouse-y', `${e.clientY - bounds.top}px`);
                    });
                });
            });
        }

        // =============================================
        // MODAL
        // =============================================
        const modalBackdrop = document.getElementById('modal-backdrop');
        const modalPanel    = document.getElementById('modal-panel');
        const modalContent  = document.getElementById('modal-content');

        function openModal(id) {
            const data = STAGES_DATA.find(d => d.id === id);
            if (!data) return;
            currentModalStageId = id;
            document.body.classList.add('modal-open');
            modalContent.scrollTop = 0;

            document.getElementById('modal-title').textContent = data.title;
            document.getElementById('modal-subtitle').textContent = data.subtitle || 'Details';

            if (data.details && Array.isArray(data.details)) {
                const frag = document.createDocumentFragment();
                data.details.forEach((section, sIdx) => {
                    const sec = document.createElement('div');
                    sec.className = 'bg-slate-50/80 p-6 rounded-2xl border border-slate-100 mb-4 hover:shadow-sm transition-shadow';
                    sec.innerHTML = `
                        <h4 class="font-bold text-slate-800 mb-4 flex items-center gap-2">
                            <span class="w-1.5 h-4 bg-blue-500 rounded-full"></span>
                            ${escHtml(section.title)}
                        </h4>
                        <ul class="space-y-4" id="section-${id}-${sIdx}"></ul>`;
                    const ul = sec.querySelector('ul');

                    section.items.forEach((item, iIdx) => {
                        const itemId  = `${id}-s${sIdx}-i${iIdx}`;
                        const checked = completedItems.has(itemId);
                        const li = document.createElement('li');
                        li.className = 'flex items-start gap-3 group cursor-pointer';
                        li.dataset.itemId = itemId;
                        li.innerHTML = `
                            <div class="pt-0.5">
                                <input type="checkbox" class="custom-checkbox" ${checked ? 'checked' : ''}>
                            </div>
                            <span class="text-sm text-slate-600 leading-relaxed group-hover:text-slate-900 transition-colors ${checked ? 'line-through text-slate-400' : ''}">${escHtml(item)}</span>`;
                        li.addEventListener('click', () => toggleItem(itemId));
                        ul.appendChild(li);
                    });
                    frag.appendChild(sec);
                });
                modalContent.innerHTML = '';
                modalContent.appendChild(frag);
            } else {
                modalContent.innerHTML = '<p class="text-slate-600">No trackable items.</p>';
            }

            updateModalProgress(data);
            modalBackdrop.classList.remove('hidden');
            requestAnimationFrame(() => {
                modalBackdrop.classList.remove('opacity-0');
                modalPanel.classList.remove('scale-95');
                modalPanel.classList.add('scale-100');
            });
        }

        function refreshModalCheckboxes() {
            modalContent.querySelectorAll('li[data-item-id]').forEach(li => {
                const itemId  = li.dataset.itemId;
                const checked = completedItems.has(itemId);
                li.querySelector('input').checked = checked;
                const span = li.querySelector('span');
                if (checked) span.classList.add('line-through', 'text-slate-400');
                else span.classList.remove('line-through', 'text-slate-400');
            });
        }

        function updateModalProgress(data) {
            const stats = getStageStats(data);
            const pct = stats.total > 0 ? (stats.checked / stats.total) * 100 : 0;
            document.getElementById('modal-progress-text').textContent = `${stats.checked}/${stats.total} Completed`;
            const bar = document.getElementById('modal-progress-bar');
            bar.style.width = `${pct}%`;
            const done = stats.checked === stats.total && stats.total > 0;
            bar.classList.toggle('bg-green-500', done);
            bar.classList.toggle('bg-blue-500', !done);
        }

        function closeModal() {
            document.body.classList.remove('modal-open');
            modalBackdrop.classList.add('opacity-0');
            modalPanel.classList.remove('scale-100');
            modalPanel.classList.add('scale-95');
            setTimeout(() => modalBackdrop.classList.add('hidden'), 300);
        }

        modalBackdrop.addEventListener('click', (e) => { if (e.target === modalBackdrop) closeModal(); });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (!document.getElementById('confirm-backdrop').classList.contains('hidden')) closeConfirm();
                else if (!modalBackdrop.classList.contains('hidden')) closeModal();
            }
        });

        // =============================================
        // TOGGLE ITEM (with undo support)
        // =============================================
        function toggleItem(itemId) {
            const wasChecked = completedItems.has(itemId);

            // Push to undo stack
            undoStack.push({ action: wasChecked ? 'uncheck' : 'check', itemId });
            if (undoStack.length > 50) undoStack.shift(); // cap stack
            updateUndoButtons();

            if (wasChecked) completedItems.delete(itemId);
            else completedItems.add(itemId);

            saveProgress();
            updateUI();
            renderRoadmap();

            const data = STAGES_DATA.find(d => d.id === currentModalStageId);
            if (data) updateModalProgress(data);

            // Fast visual update of the clicked item
            const li = modalContent.querySelector(`li[data-item-id="${itemId}"]`);
            if (li) {
                const isNowChecked = completedItems.has(itemId);
                li.querySelector('input').checked = isNowChecked;
                const span = li.querySelector('span');
                if (isNowChecked) span.classList.add('line-through', 'text-slate-400');
                else span.classList.remove('line-through', 'text-slate-400');
            }

            if (completedItems.size === TOTAL_ITEMS_COUNT && TOTAL_ITEMS_COUNT > 0) {
                setTimeout(() => { closeModal(); triggerReward(); }, 500);
            }
        }

        // =============================================
        // UI UPDATE
        // =============================================
        function updateUI() {
            const pct = TOTAL_ITEMS_COUNT > 0 ? Math.round((completedItems.size / TOTAL_ITEMS_COUNT) * 100) : 0;
            document.getElementById('progress-bar').style.width = `${pct}%`;
            document.getElementById('progress-text').textContent = `${pct}%`;
        }

        // =============================================
        // REWARD
        // =============================================
        const rewardBackdrop = document.getElementById('reward-backdrop');
        const rewardPanel    = document.getElementById('reward-panel');

        function triggerReward() {
            document.getElementById('reward-title').textContent  = META_DATA.completionTitle   || 'GOAL REACHED';
            document.getElementById('reward-message').textContent = META_DATA.completionMessage || 'All items completed!';
            const end = Date.now() + 3000;
            (function frame() {
                confetti({ particleCount: 5, angle: 60,  spread: 55, origin: { x: 0 } });
                confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 } });
                if (Date.now() < end) requestAnimationFrame(frame);
            })();
            rewardBackdrop.classList.remove('hidden');
            requestAnimationFrame(() => {
                rewardBackdrop.classList.remove('opacity-0');
                rewardPanel.classList.remove('scale-90');
                rewardPanel.classList.add('scale-100');
            });
        }

        function closeReward() {
            rewardBackdrop.classList.add('opacity-0');
            rewardPanel.classList.remove('scale-100');
            rewardPanel.classList.add('scale-90');
            setTimeout(() => rewardBackdrop.classList.add('hidden'), 500);
        }

        // =============================================
        // RESIZE
        // =============================================
        let resizeTimer;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(renderRoadmap, 100);
        });

        // =============================================
        // BOOT
        // =============================================
        window.addEventListener('DOMContentLoaded', () => {
            updateOnlineStatus();
            loadMapList();
        });
    </script>
</body>
</html>
