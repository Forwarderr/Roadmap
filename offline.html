<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1e293b">
    <title>Offline — Roadmap</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
            background: #f0f4f8;
            color: #1e293b;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .card {
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.6);
            border-radius: 24px;
            padding: 48px 40px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 8px 32px rgba(31,38,135,0.1);
        }
        .icon {
            width: 64px;
            height: 64px;
            background: #e2e8f0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 28px;
        }
        h1 { font-size: 22px; font-weight: 800; margin-bottom: 10px; }
        p  { font-size: 14px; color: #64748b; line-height: 1.6; margin-bottom: 28px; }
        button {
            background: #1e293b;
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 12px 28px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #334155; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">⚡</div>
        <h1>You're Offline</h1>
        <p>No internet connection detected. Your progress is saved locally — connect again to load new roadmaps.</p>
        <button onclick="window.location.reload()">Try Again</button>
    </div>
</body>
</html>
